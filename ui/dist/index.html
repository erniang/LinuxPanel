<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinuxPanel - 轻量级Linux服务器管理面板</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background-color: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
        }
        h1 {
            color: #409EFF;
            margin-bottom: 20px;
        }
        p {
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .status {
            display: inline-block;
            background-color: #67C23A;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .info {
            margin-top: 30px;
            font-size: 0.9em;
            color: #666;
        }
        .button {
            background-color: #409EFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        .button:hover {
            background-color: #337ECC;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LinuxPanel 面板已成功安装</h1>
        <p>面板后端服务正常运行中，但前端文件尚未构建</p>
        <div class="status">运行中</div>
        <div class="info">
            <p>请执行以下步骤完成前端构建:</p>
            <ol style="text-align: left;">
                <li>进入项目目录: <code>cd /opt/linuxpanel</code></li>
                <li>进入前端目录: <code>cd ui</code></li>
                <li>安装依赖: <code>npm install</code></li>
                <li>构建前端: <code>npm run build</code></li>
                <li>重启服务: <code>systemctl restart linuxpanel</code></li>
            </ol>
            <p>默认管理员账户: admin</p>
            <p>默认密码: admin123</p>
            <p>API地址: http://localhost:8080/api</p>
        </div>
    </div>
</body>
</html>
